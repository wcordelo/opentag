name = "opentag-harness"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[vars]
HARNESS_ALLOWED_REPO_HOSTS = "github.com"
HARNESS_ALLOWED_REPO_ORGS = "wcordelo"
CLAUDEX_PROXY_URL = "https://claudex.internal"
CLAUDEX_MODEL = "gpt-5.6-sol"

[[services]]
binding = "CLAUDEX_PROXY"
service = "opentag-claudex-proxy"

# Real Claude Code harness image. Deploy this target before deploying the bot's
# HARNESS service binding in edge/wrangler.bot.toml.
[[containers]]
class_name = "HarnessContainer"
image = "../../../containers/harness/Dockerfile"
image_build_context = "../../.."
max_instances = 10
instance_type = "basic"

[[durable_objects.bindings]]
name = "HARNESS_CONTAINER"
class_name = "HarnessContainer"

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "opentag-research-blobs"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["HarnessContainer"]

# Worker-only secrets (set before deployment, never commit values). The
# Container receives sentinels; outbound handlers inject these only for the
# exact api.anthropic.com, private Claudex service binding, or GitHub request:
#   ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN
#   CLAUDEX_PROXY_URL is the synthetic https://claudex.internal origin
#   CLAUDEX_MODEL defaults to gpt-5.6-sol
#   GITHUB_TOKEN (optional, for private clone + approved push/PR)
#   OPENTAG_TOOL_BIN (optional; enables the installed opentag-tool-host bridge)
#   HARNESS_AUTH_TOKEN (required; shared only with the bot Worker)
# Vars: HARNESS_ALLOWED_REPO_HOSTS=github.com and an explicit
# HARNESS_ALLOWED_REPO_ORGS list. Unknown hosts and empty-org clones fail closed.
