name = "opentag-sandbox"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# The Sandbox SDK's `Sandbox` DO class is re-exported from src/index.ts.
[durable_objects]
bindings = [
  { name = "SANDBOX", class_name = "Sandbox" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Sandbox"]

# [[containers]] (image = "./Dockerfile", instance limits, max_instances) is
# added once this account has the image built and pushed — building it here
# would require `wrangler deploy` / a registry push, which is out of scope
# for this scaffold. See DECISIONS.md §2 and edge/wrangler.toml's note.
#
# [[containers]]
# class_name = "Sandbox"
# image = "./Dockerfile"
# max_instances = 10

# The Claude Code coding harness (GOAL.md Phase A5 / SPEC.md §4.4) is a
# separate image at ../../containers/harness/Dockerfile, fronted by
# edge/workers/sandbox/harness-server.ts (plain Node HTTP server, not a
# Worker — runs INSIDE that container). It is not wired into this
# wrangler.toml's [[containers]] block either, for the same gated-deploy
# reason as the block above; edge/src/harness/client.ts is the edge-side
# caller and expects an env binding (HARNESS service binding or HARNESS_URL)
# once that wiring lands.
