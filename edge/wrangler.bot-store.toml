# Thin alias of the bot spine for StateStore e2e / local store debugging.
# Product default deploy remains wrangler.toml (same classes + full routes).
name = "opentag-edge"
main = "src/worker.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "BOT_STATE"
class_name = "ConversationStateDO"

[[durable_objects.bindings]]
name = "WORKSPACE_CONFIG"
class_name = "WorkspaceConfigDO"

[[durable_objects.bindings]]
name = "KNOWLEDGE"
class_name = "KnowledgeDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ConversationStateDO"]

[[migrations]]
tag = "v2-claude-tag"
new_sqlite_classes = ["WorkspaceConfigDO", "KnowledgeDO"]

[vars]
AGENT_URL = "http://localhost:8200/api/copilotkit/agent/triage/run"
ENVIRONMENT = "development"
