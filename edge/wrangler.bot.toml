# Production Claude Tag bot spine (clean DO migration history).
# Local `wrangler.toml` keeps name "opentag-edge" for dev; this config deploys
# as opentag-bot to avoid the legacy ThreadDurableObject migration conflict.
name = "opentag-bot"
main = "src/worker.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[durable_objects.bindings]]
name = "BOT_STATE"
class_name = "ConversationStateDO"

[[durable_objects.bindings]]
name = "WORKSPACE_CONFIG"
class_name = "WorkspaceConfigDO"

[[durable_objects.bindings]]
name = "KNOWLEDGE"
class_name = "KnowledgeDO"

# Per-thread session event log (SPEC.md §3.2/§4.1) — replay source for the
# render-obligation alarm fallback in ConversationStateDO.
[[durable_objects.bindings]]
name = "SESSION_EVENTS"
class_name = "SessionEventDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ConversationStateDO", "WorkspaceConfigDO", "KnowledgeDO"]

[[migrations]]
tag = "v2-session-events"
new_sqlite_classes = ["SessionEventDO"]

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "opentag-research-blobs"

[[services]]
binding = "RESEARCH_TASKS"
service = "opentag-orchestrator"

# Worker→Worker must use a service binding — public workers.dev fetch returns 1042
# on the same zone. HttpAgent still needs AGENT_URL for the Request path/URL.
[[services]]
binding = "AGENT_RUNTIME"
service = "opentag-agent"

[vars]
ENVIRONMENT = "production"
# AGENT_URL: https://opentag-agent.<account>.workers.dev/api/copilotkit/agent/triage/run
# (path used by HttpAgent; traffic goes through AGENT_RUNTIME service binding)

# Secrets: SLACK_BOT_TOKEN, SLACK_SIGNING_SECRET, AGENT_URL,
# ADMIN_SECRET, INTERNAL_SECRET
