# OpenTag edge — DEFAULT deploy: Claude Tag bot + StateStore spine.
# See PRODUCT.md. Research task Workers use wrangler.research.toml.
name = "opentag-edge"
main = "src/worker.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Bot conversation state (HITL, turn locks, transcripts, dedup).
[[durable_objects.bindings]]
name = "BOT_STATE"
class_name = "ConversationStateDO"

# Per-workspace channel prompts + access bundles.
[[durable_objects.bindings]]
name = "WORKSPACE_CONFIG"
class_name = "WorkspaceConfigDO"

# Longer-term knowledge base (not research verified_facts).
[[durable_objects.bindings]]
name = "KNOWLEDGE"
class_name = "KnowledgeDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ConversationStateDO"]

[[migrations]]
tag = "v2-claude-tag"
new_sqlite_classes = ["WorkspaceConfigDO", "KnowledgeDO"]

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "opentag-research-blobs"

# Research task Worker (wrangler.research.toml → name = "opentag-orchestrator").
[[services]]
binding = "RESEARCH_TASKS"
service = "opentag-orchestrator"

[vars]
ENVIRONMENT = "development"
# Local default only. For deployed Workers, override AGENT_URL to a public
# runtime host (Railway/Fly/etc.) — Workers cannot reach your laptop localhost.
AGENT_URL = "http://localhost:8200/api/copilotkit/agent/triage/run"

# Secrets (wrangler secret put):
# SLACK_BOT_TOKEN, SLACK_SIGNING_SECRET, AGENT_AUTH_HEADER
# ADMIN_SECRET — protects /admin/* /debug/* /tasks/start
# INTERNAL_SECRET — forwarded to RESEARCH_TASKS /research
# Optional: put AGENT_URL as a secret/var for production overrides.
