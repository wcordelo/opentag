# OpenTag edge — DEFAULT local/dev bot Worker.
# Production Claude Tag deploy: `npm run deploy:bot` → wrangler.bot.toml (opentag-bot).
# Research task Workers use wrangler.research.toml.
name = "opentag-edge"
main = "src/worker.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[[analytics_engine_datasets]]
binding = "DELIVERY_METRICS"
dataset = "opentag_delivery_dev"

# Bot conversation state (HITL, turn locks, transcripts, dedup).
[[durable_objects.bindings]]
name = "BOT_STATE"
class_name = "ConversationStateDO"

# Per-workspace channel prompts + access bundles.
[[durable_objects.bindings]]
name = "WORKSPACE_CONFIG"
class_name = "WorkspaceConfigDO"

# Longer-term knowledge base (not research verified_facts).
[[durable_objects.bindings]]
name = "KNOWLEDGE"
class_name = "KnowledgeDO"

# Per-thread session event log (SPEC.md §3.2/§4.1) — replay source for the
# render-obligation alarm fallback in ConversationStateDO.
[[durable_objects.bindings]]
name = "SESSION_EVENTS"
class_name = "SessionEventDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ConversationStateDO"]

[[migrations]]
tag = "v2-claude-tag"
new_sqlite_classes = ["WorkspaceConfigDO", "KnowledgeDO"]

[[migrations]]
tag = "v3-session-events"
new_sqlite_classes = ["SessionEventDO"]

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "opentag-research-blobs"

# Research task Worker (wrangler.research.toml → name = "opentag-orchestrator").
[[services]]
binding = "RESEARCH_TASKS"
service = "opentag-orchestrator"

# Claude Code harness container (GOAL.md Phase A5, SPEC.md §3.6/§4.4). The
# container Worker + image ship separately (edge/workers/sandbox/ +
# containers/harness/, owned by a different build track) and deploy is
# gated (GOAL.md house rule 6) — uncomment once that Worker is deployed.
# Mirrors edge/workers/sandbox/wrangler.toml's commented [[containers]] block.
#
# [[services]]
# binding = "HARNESS"
# service = "opentag-harness"

[vars]
ENVIRONMENT = "development"
# AGENT_URL is a wrangler secret (public runtime host). Do not put localhost
# here — it would overwrite the secret on deploy and break production replies.
# Local: set AGENT_URL in .dev.vars (http://localhost:8200/...).

# Secrets (wrangler secret put):
# SLACK_BOT_TOKEN, SLACK_SIGNING_SECRET, AGENT_URL, AGENT_AUTH_HEADER
# ADMIN_SECRET — protects /admin/* /debug/* /tasks/start
# INTERNAL_SECRET — forwarded to RESEARCH_TASKS /research
#
# Harness container (Phase A5, gated — see the commented [[services]] block
# above). Set only once the container Worker is deployed:
# HARNESS_URL = "https://opentag-harness.<account>.workers.dev"  (fallback when no HARNESS binding)
# HARNESS_REPO_URL = "https://github.com/<org>/<default-repo>"   (optional default clone target)
# HARNESS_AUTH_TOKEN is a secret: `wrangler secret put HARNESS_AUTH_TOKEN`

[env.production]
vars = { ENVIRONMENT = "production" }
